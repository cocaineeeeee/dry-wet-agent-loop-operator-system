name: CI

# 两层 CI：
#   fast — lint（ruff，配置见 pyproject [tool.ruff]）+ 快测试子集（<1min），每次
#          push/PR 都跑，是硬门。代码格式由本地 pre-commit（ruff format）保证，CI
#          不重复硬拒存量格式债。
#   full — 全量测试含真 PySCF dry 腿 e2e。需要重科学依赖（PySCF）且部分集成测试
#          面向 Slurm/子进程后端，不适合每次 push 跑 → 仅手动（workflow_dispatch）
#          或每周定时触发，在装好 PySCF 的 runner 上跑。
# references/（第三方 clone）与 runs/（运行产物）改动不触发 CI。

on:
  push:
    branches: [main]
    paths-ignore:
      - 'references/**'
      - 'runs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'references/**'
      - 'runs/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # 每周一 06:00 UTC 跑一次全量

# 同一分支的旧运行自动取消，省算力
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- 第一层：lint + 快测试（秒级反馈，每次 push/PR 的硬门）----
  fast:
    name: fast (lint + quick tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install lint + test deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -e .

      - name: Ruff lint (config in pyproject [tool.ruff])
        run: ruff check .

      - name: Quick test suite (<1min, no heavy deps)
        run: |
          pytest -q \
            tests/test_kernel.py \
            tests/test_design.py \
            tests/test_adapters.py \
            tests/test_planner_stages.py

  # ---- 第二层：全量测试含真 PySCF e2e（手动/定时；装 PySCF）----
  full:
    name: full (all tests incl. real-PySCF e2e)
    needs: fast
    # push/PR 不跑（GitHub runner 无 Slurm、重依赖慢）；仅手动或每周定时。
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test + science deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout pyscf
          pip install -e .

      - name: Full test suite (incl. real-PySCF e2e loop)
        # e2e/mcl 跑真实闭环（PySCF 子进程后端），较慢；单条用例超时保护，避免挂死。
        run: pytest -q --durations=10 --timeout=300
